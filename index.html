<body>

<!-- AUTH GATE: shown instead of the app when cloud login is required but not signed in -->
<div id="authGate" class="hidden" style="position:fixed;inset:0;background:#0F1826;z-index:500;display:flex;align-items:center;justify-content:center;padding:24px;">
  <div style="width:100%;max-width:340px;">
    <div style="text-align:center;margin-bottom:28px;">
      <div style="font-size:32px;">🔒</div>
      <h2 style="color:#EDEFF4;margin-top:10px;">Ledger</h2>
      <p style="color:#8C9AB3;font-size:13px;margin-top:4px;">Sign in to view your data</p>
    </div>
    <div class="field"><label>Email</label><input id="gateEmail" type="email" placeholder="you@example.com"></div>
    <div class="field"><label>Password</label><input id="gatePw" type="password" placeholder="At least 6 characters"></div>
    <button class="btn-primary" onclick="cloudSignIn(true)">Sign in</button>
    <button class="btn-secondary" id="gateSignupBtn" onclick="cloudSignUp(true)">Create account</button>
    <p id="gateError" style="color:var(--red);font-size:12px;margin-top:10px;text-align:center;"></p>
  </div>
</div>

<div id="appRoot" class="hidden">
<div class="topbar">
  <div class="brand">Ledger</div>
  <div style="display:flex;align-items:center;gap:10px;">
    <span class="date" id="todayDate"></span>
    <span id="syncBadge" class="badge" style="cursor:pointer;">Backup off</span>
  </div>
</div>

<main>

  <!-- DASHBOARD -->
  <section class="page" id="page-dashboard">
    <div class="hero">
      <div class="label">Net worth</div>
      <div class="amount" id="heroAmount">₹0</div>
      <div class="sub">
        <div>Liquid cash<span class="val" id="statCash">₹0</span></div>
        <div>This month spent<span class="val" id="statMonth">₹0</span></div>
      </div>
    </div>
    <div class="grid-2">
      <div class="stat-card">
        <div class="t">Owed on cards</div>
        <div class="v neg" id="statOwed">₹0</div>
      </div>
      <div class="stat-card">
        <div class="t">Money lent out</div>
        <div class="v pos" id="statLent">₹0</div>
      </div>
    </div>
    <div class="section-head"><h2>Recent activity</h2><span class="link" onclick="setTab('transactions')">See all</span></div>
    <div id="recentList" class="tape"></div>
  </section>

  <!-- ACCOUNTS -->
  <section class="page hidden" id="page-accounts">
    <div class="section-head"><h2>Your accounts</h2><span class="link" id="addAccountBtn">+ Add account</span></div>
    <div id="accountsList"></div>
  </section>

  <!-- TRANSACTIONS -->
  <section class="page hidden" id="page-transactions">
    <div class="section-head">
      <h2>Transactions</h2>
      <select id="txFilter" style="width:auto;padding:6px 8px;font-size:12px;">
        <option value="all">All types</option>
        <option value="expense">Expenses</option>
        <option value="income">Income</option>
        <option value="transfer">Transfers</option>
        <option value="lend">Lent</option>
        <option value="purchase_for_other">Paid for others</option>
        <option value="repay_in">Repayments</option>
      </select>
    </div>
    <div id="txList" class="tape"></div>
  </section>

  <!-- LENDING -->
  <section class="page hidden" id="page-lending">
    <div class="hero">
      <div class="label">Total outstanding</div>
      <div class="amount" id="lendingTotal">₹0</div>
    </div>
    <div class="section-head"><h2>People who owe you</h2></div>
    <div id="loansList" class="tape"></div>
  </section>

</main>

<button class="fab" id="fab" aria-label="Add transaction">+</button>

<div class="tabbar">
  <button class="tab active" data-tab="dashboard"><span class="ic">🏠</span>Home</button>
  <button class="tab" data-tab="accounts"><span class="ic">🏦</span>Accounts</button>
  <button class="tab" data-tab="transactions"><span class="ic">📜</span>History</button>
  <button class="tab" data-tab="lending"><span class="ic">🤝</span>Lending</button>
</div>

<div id="sheetRoot"></div>
</div><!-- /appRoot -->

<!-- Cloud sync (Firebase) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
